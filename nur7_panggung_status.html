<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Indramayu Club TV - Video Generator</title>
    <style>
        body {
            background-color: #0a1a10; /* Hijau gelap Makrifat */
            color: #d4af37; /* Warna Emas Sultan */
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 50px;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 30px;
            display: inline-block;
            margin: 10px;
            vertical-align: top;
            background: rgba(6, 20, 11, 0.6);
        }
        h1 { text-transform: uppercase; }
        .status { color: #00ff00; font-weight: bold; }

        .gambar-bergerak {
            width: 300px;
            height: 300px;
            overflow: hidden;
            border: 2px solid #d4af37;
            margin: 15px auto;
            background: #000;
        }

        .gambar-bergerak img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoomEfek 10s infinite alternate;
        }

        @keyframes zoomEfek {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .btn-sultan {
            padding: 15px 30px; 
            background: linear-gradient(135deg, #c9a84c, #ffd700); 
            border: none;
            color: #06140b;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.4);
        }
    </style>
</head>
<body>

    <h1>INDRAMAYU CLUB TV</h1>
    <p>Status: <span class="status">Panggung Sultan Aktif</span></p>

    <div style="display: block; margin: 0 auto;">
        <!-- Jalur Video disesuaikan ke root ~/hugoNUR3 sesuai perintah ls -->
        <video width="640" height="640" controls style="border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(201,168,76,0.3);">
          <source src="hasil_panggung_tv.mp4" type="video/mp4">
          Browser Anda tidak mendukung tag video.
        </video>
    </div>

    <br>

    <div class="container">
        <h3>[ Konfigurasi Drive3 ]</h3>
        <p>Sistem: FFmpeg Engine Terintegrasi</p>
        <p>Output: <i>hasil_panggung_tv.mp4</i></p>
        <p>Status Data: Mandali 100%</p>
    </div>

    <div class="container">
        <h3>Unggah Aset Makrifat</h3>
        <input type="file" id="uploadInput" accept="image/*">

        <div class="gambar-bergerak" id="wadahGambar">
            <img id="gambarTampil" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%2306140b'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23c9a84c' font-size='10'>Siap Aset</text></svg>" alt="Preview">
        </div>
    </div>

    <button onclick="tombolGenerate()" class="btn-sultan">
        JALANKAN GENERATOR VIDEO
    </button>

<script>
// 1. Script Preview Gambar
document.getElementById('uploadInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('gambarTampil').src = event.target.result;
        }
        reader.readAsDataURL(file);
    }
});

// 2. Fungsi Generator Panggung
async function tombolGenerate() {
    const fileInput = document.getElementById('uploadInput');
    if (!fileInput.files[0]) {
        alert("Pilih gambar dulu sebelum generate.");
        return;
    }
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        alert("Mengunggah aset ke server...");
        const uploadRes = await fetch('/upload', { method: 'POST', body: formData });
        if (!uploadRes.ok) throw new Error('Upload gagal, status ' + uploadRes.status);

        alert("Sedang memproses video via FFmpeg Engine...");
        const res = await fetch('/generate');
        if (!res.ok) throw new Error('Generate gagal, status ' + res.status);
        
        const data = await res.json();
        alert(data.message);
        if (data.status === 'sukses') {
            location.reload();
        }
    } catch (err) {
        alert("Gagal terhubung ke server: " + err.message);
        console.error(err);
    }
}
</script>

<!-- ⛑️ AGEN ALWI GRANDLEW NAVIGATION -->
<script src="components/agen_alwi.js"></script>

</body>
</html>
