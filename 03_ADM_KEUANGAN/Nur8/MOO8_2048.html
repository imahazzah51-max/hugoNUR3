<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 2048 - Nur 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{--mustard:#e8a838;--burnt:#cf5c26;--avocado:#6f8c3e;--cream:#f4e8cf;--brown:#3a2317;--teal:#237a7a;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:repeating-conic-gradient(from 0deg,var(--mustard) 0deg 10deg,var(--burnt) 10deg 20deg);background-attachment:fixed;font-family:'Special Elite',monospace;color:var(--brown);display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
  .frame{width:100%;max-width:420px;background:var(--cream);border:6px solid var(--brown);border-radius:26px;padding:22px 18px 30px;box-shadow:0 0 0 6px var(--mustard),0 12px 30px rgba(0,0,0,.5);text-align:center;}
  h1{font-family:'Bungee',cursive;font-size:22px;margin:0 0 4px;color:var(--burnt);text-shadow:3px 3px 0 var(--avocado);text-transform:uppercase;}
  .sub{font-size:11px;color:var(--teal);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;}
  #score{font-size:16px;font-weight:bold;margin-bottom:12px;}
  .board{position:relative;width:296px;height:296px;background:var(--brown);border-radius:12px;margin:0 auto 12px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;touch-action:none;}
  .tile-bg{background:rgba(255,255,255,0.15);border-radius:8px;}
  .tile{position:absolute;width:62px;height:62px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bungee',cursive;font-size:20px;color:#fff;transition:top 0.12s, left 0.12s;}
  #status{font-weight:bold;font-size:15px;margin:10px 0;color:var(--burnt);min-height:22px;}
  button.action{font-family:'Bungee',cursive;font-size:13px;background:var(--avocado);color:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 0 var(--brown);margin-top:6px;}
  button.action:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
  .back-link{display:inline-block;font-family:'Bungee',cursive;font-size:12px;color:var(--brown);background:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:10px 18px;text-decoration:none;margin-top:16px;box-shadow:0 4px 0 var(--brown);}
  .back-link:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
</style>
</head>
<body>
<div class="frame">
  <h1>🔢 Game 2048</h1>
  <div class="sub">Satukan Blok Angka</div>
  <div id="score">Skor: 0</div>
  <div class="board" id="board"></div>
  <div id="status">Swipe atau pakai tombol panah!</div>
  <button class="action" onclick="resetGame()">🔄 ULANG</button>
  <br>
  <a class="back-link" href="index.html">⬅ KEMBALI KE PORTAL</a>
</div>
<script>
  const boardEl = document.getElementById('board');
  const colors = {2:'#e8a838',4:'#e0932a',8:'#cf5c26',16:'#c14a1c',32:'#237a7a',64:'#1c5e5e',128:'#6f8c3e',256:'#547029',512:'#3a2317',1024:'#2a1811',2048:'#8b1e3f'};
  let grid, score, over;

  for(let i=0;i<16;i++){
    const bg = document.createElement('div');
    bg.className = 'tile-bg';
    boardEl.appendChild(bg);
  }

  function resetGame(){
    grid = Array.from({length:4},()=>Array(4).fill(0));
    score = 0; over = false;
    document.getElementById('status').textContent = 'Swipe atau pakai tombol panah!';
    addTile(); addTile();
    render();
  }

  function addTile(){
    const empty = [];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) empty.push([r,c]);
    if(empty.length===0) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render(){
    boardEl.querySelectorAll('.tile').forEach(t => t.remove());
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        const v = grid[r][c];
        if(v===0) continue;
        const t = document.createElement('div');
        t.className = 'tile';
        t.textContent = v;
        t.style.background = colors[v] || '#8b1e3f';
        t.style.left = (8 + c*70) + 'px';
        t.style.top = (8 + r*70) + 'px';
        if(v >= 128) t.style.fontSize = '16px';
        boardEl.appendChild(t);
      }
    }
    document.getElementById('score').textContent = 'Skor: ' + score;
  }

  function slide(row){
    let arr = row.filter(v => v !== 0);
    for(let i=0;i<arr.length-1;i++){
      if(arr[i] === arr[i+1]){
        arr[i] *= 2;
        score += arr[i];
        arr.splice(i+1,1);
      }
    }
    while(arr.length < 4) arr.push(0);
    return arr;
  }

  function rotate(g){
    const n = Array.from({length:4},()=>Array(4).fill(0));
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) n[c][3-r] = g[r][c];
    return n;
  }

  function move(dir){
    if(over) return;
    let g = grid.map(r => [...r]);
    let rotations = {left:0, up:1, right:2, down:3}[dir];
    for(let i=0;i<rotations;i++) g = rotate(g);
    let moved = false;
    const newG = g.map(row => {
      const before = row.join(',');
      const after = slide(row);
      if(before !== after.join(',')) moved = true;
      return after;
    });
    let result = newG;
    for(let i=0;i<(4-rotations)%4;i++) result = rotate(result);
    if(moved){
      grid = result;
      addTile();
      render();
      checkGameOver();
    }
  }

  function checkGameOver(){
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      if(grid[r][c] === 0) return;
      if(grid[r][c] === 2048){ document.getElementById('status').textContent = '🎉 2048 Tercapai! Kamu Juara!'; over = true; return; }
      if(c<3 && grid[r][c] === grid[r][c+1]) return;
      if(r<3 && grid[r][c] === grid[r+1][c]) return;
    }
    over = true;
    document.getElementById('status').textContent = '💀 Game Over! Skor akhir: ' + score;
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') move('left');
    else if(e.key === 'ArrowRight') move('right');
    else if(e.key === 'ArrowUp') move('up');
    else if(e.key === 'ArrowDown') move('down');
  });

  let touchStart = null;
  boardEl.addEventListener('touchstart', e => { touchStart = e.touches[0]; });
  boardEl.addEventListener('touchend', e => {
    if(!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
    touchStart = null;
  });

  resetGame();
</script>
<script src="components/agen_alwi.js"></script>
</body>
</html>
