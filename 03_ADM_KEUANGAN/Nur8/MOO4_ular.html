<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ular Klasik - Nur 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{--mustard:#e8a838;--burnt:#cf5c26;--avocado:#6f8c3e;--cream:#f4e8cf;--brown:#3a2317;--teal:#237a7a;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:repeating-conic-gradient(from 0deg,var(--mustard) 0deg 10deg,var(--burnt) 10deg 20deg);background-attachment:fixed;font-family:'Special Elite',monospace;color:var(--brown);display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
  .frame{width:100%;max-width:420px;background:var(--cream);border:6px solid var(--brown);border-radius:26px;padding:22px 18px 30px;box-shadow:0 0 0 6px var(--mustard),0 12px 30px rgba(0,0,0,.5);text-align:center;}
  h1{font-family:'Bungee',cursive;font-size:22px;margin:0 0 4px;color:var(--burnt);text-shadow:3px 3px 0 var(--avocado);text-transform:uppercase;}
  .sub{font-size:11px;color:var(--teal);margin-bottom:16px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;}
  canvas{background:var(--brown);border:4px solid var(--brown);border-radius:12px;touch-action:none;max-width:100%;}
  #status{font-weight:bold;font-size:15px;margin:10px 0;color:var(--burnt);min-height:22px;}
  .pad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:6px;justify-content:center;margin:14px auto 0;}
  .pad button{font-size:20px;border:3px solid var(--brown);border-radius:10px;background:var(--avocado);color:var(--cream);box-shadow:0 3px 0 var(--brown);cursor:pointer;}
  .pad button:active{transform:translateY(3px);box-shadow:0 0 0 var(--brown);}
  button.action{font-family:'Bungee',cursive;font-size:13px;background:var(--avocado);color:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 0 var(--brown);margin-top:12px;}
  button.action:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
  .back-link{display:inline-block;font-family:'Bungee',cursive;font-size:12px;color:var(--brown);background:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:10px 18px;text-decoration:none;margin-top:16px;box-shadow:0 4px 0 var(--brown);}
  .back-link:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
</style>
</head>
<body>
<div class="frame">
  <h1>🐍 Ular Klasik</h1>
  <div class="sub">Skor: <span id="score">0</span></div>
  <canvas id="game" width="280" height="280"></canvas>
  <div id="status">Pakai tombol panah / swipe / tombol bawah</div>
  <div class="pad">
    <div></div><button onclick="setDir(0,-1)">⬆️</button><div></div>
    <button onclick="setDir(-1,0)">⬅️</button><div></div><button onclick="setDir(1,0)">➡️</button>
    <div></div><button onclick="setDir(0,1)">⬇️</button><div></div>
  </div>
  <button class="action" onclick="resetGame()">🔄 ULANG</button>
  <br>
  <a class="back-link" href="index.html">⬅ KEMBALI KE PORTAL</a>
</div>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const grid = 14, cells = 20;
  let snake, dir, nextDir, food, score, gameOver, loopId;

  function resetGame(){
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; gameOver = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('status').textContent = 'Pakai tombol panah / swipe / tombol bawah';
    placeFood();
    if(loopId) clearInterval(loopId);
    loopId = setInterval(tick, 130);
  }

  function placeFood(){
    food = {x: Math.floor(Math.random()*cells), y: Math.floor(Math.random()*cells)};
    for(const s of snake){ if(s.x===food.x && s.y===food.y){ placeFood(); return; } }
  }

  function setDir(x,y){
    if(dir.x === -x && dir.y === -y) return;
    nextDir = {x,y};
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') setDir(0,-1);
    else if(e.key === 'ArrowDown') setDir(0,1);
    else if(e.key === 'ArrowLeft') setDir(-1,0);
    else if(e.key === 'ArrowRight') setDir(1,0);
  });

  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; });
  canvas.addEventListener('touchend', e => {
    if(!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if(Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
  });

  function tick(){
    if(gameOver) return;
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    if(head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells || snake.some(s => s.x===head.x && s.y===head.y)){
      gameOver = true;
      document.getElementById('status').textContent = '💀 Game Over! Skor akhir: ' + score;
      clearInterval(loopId);
      draw();
      return;
    }
    snake.unshift(head);
    if(head.x === food.x && head.y === food.y){
      score++;
      document.getElementById('score').textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw(){
    ctx.fillStyle = '#3a2317';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#cf5c26';
    ctx.fillRect(food.x*grid, food.y*grid, grid-1, grid-1);
    snake.forEach((s,i) => {
      ctx.fillStyle = i===0 ? '#e8a838' : '#6f8c3e';
      ctx.fillRect(s.x*grid, s.y*grid, grid-1, grid-1);
    });
  }

  resetGame();
</script>
<script src="components/agen_alwi.js"></script>
</body>
</html>
