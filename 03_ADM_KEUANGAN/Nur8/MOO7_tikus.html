<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tepuk Tikus - Nur 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{--mustard:#e8a838;--burnt:#cf5c26;--avocado:#6f8c3e;--cream:#f4e8cf;--brown:#3a2317;--teal:#237a7a;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:repeating-conic-gradient(from 0deg,var(--mustard) 0deg 10deg,var(--burnt) 10deg 20deg);background-attachment:fixed;font-family:'Special Elite',monospace;color:var(--brown);display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
  .frame{width:100%;max-width:420px;background:var(--cream);border:6px solid var(--brown);border-radius:26px;padding:22px 18px 30px;box-shadow:0 0 0 6px var(--mustard),0 12px 30px rgba(0,0,0,.5);text-align:center;}
  h1{font-family:'Bungee',cursive;font-size:22px;margin:0 0 4px;color:var(--burnt);text-shadow:3px 3px 0 var(--avocado);text-transform:uppercase;}
  .sub{font-size:11px;color:var(--teal);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;font-weight:bold;}
  .stats{display:flex;justify-content:space-around;font-size:15px;font-weight:bold;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(3,84px);grid-template-rows:repeat(3,84px);gap:8px;justify-content:center;margin-bottom:14px;}
  .hole{background:var(--brown);border:3px solid #22150c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;cursor:pointer;overflow:hidden;user-select:none;}
  .hole.up{background:radial-gradient(circle, #6b4326 0%, var(--brown) 70%);}
  #status{font-weight:bold;font-size:15px;margin:10px 0;color:var(--burnt);min-height:22px;}
  button.action{font-family:'Bungee',cursive;font-size:13px;background:var(--avocado);color:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 0 var(--brown);margin-top:6px;}
  button.action:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
  .back-link{display:inline-block;font-family:'Bungee',cursive;font-size:12px;color:var(--brown);background:var(--cream);border:3px solid var(--brown);border-radius:20px;padding:10px 18px;text-decoration:none;margin-top:16px;box-shadow:0 4px 0 var(--brown);}
  .back-link:active{transform:translateY(4px);box-shadow:0 0 0 var(--brown);}
</style>
</head>
<body>
<div class="frame">
  <h1>🐹 Tepuk Tikus</h1>
  <div class="sub">Uji Kecepatan Jari</div>
  <div class="stats">
    <div>Skor: <span id="score">0</span></div>
    <div>Waktu: <span id="time">30</span>s</div>
  </div>
  <div class="grid" id="grid"></div>
  <div id="status">Tekan MULAI buat main!</div>
  <button class="action" onclick="startGame()">▶ MULAI</button>
  <br>
  <a class="back-link" href="index.html">⬅ KEMBALI KE PORTAL</a>
</div>
<script>
  const gridEl = document.getElementById('grid');
  const holes = [];
  for(let i = 0; i < 9; i++){
    const h = document.createElement('div');
    h.className = 'hole';
    h.onclick = () => whack(i);
    gridEl.appendChild(h);
    holes.push(h);
  }

  let score, timeLeft, activeHole, spawnTimer, countdownTimer, playing;

  function startGame(){
    score = 0; timeLeft = 30; activeHole = -1; playing = true;
    document.getElementById('score').textContent = 0;
    document.getElementById('time').textContent = timeLeft;
    document.getElementById('status').textContent = 'Tepuk tikusnya, gas!';
    holes.forEach(h => { h.classList.remove('up'); h.textContent = ''; });
    if(spawnTimer) clearInterval(spawnTimer);
    if(countdownTimer) clearInterval(countdownTimer);
    spawnMole();
    spawnTimer = setInterval(spawnMole, 800);
    countdownTimer = setInterval(() => {
      timeLeft--;
      document.getElementById('time').textContent = timeLeft;
      if(timeLeft <= 0) endGame();
    }, 1000);
  }

  function spawnMole(){
    if(!playing) return;
    if(activeHole !== -1){
      holes[activeHole].classList.remove('up');
      holes[activeHole].textContent = '';
    }
    activeHole = Math.floor(Math.random() * 9);
    holes[activeHole].classList.add('up');
    holes[activeHole].textContent = '🐹';
  }

  function whack(i){
    if(!playing || i !== activeHole) return;
    score++;
    document.getElementById('score').textContent = score;
    holes[i].classList.remove('up');
    holes[i].textContent = '💫';
    activeHole = -1;
    setTimeout(() => { if(playing) holes[i].textContent = ''; }, 150);
  }

  function endGame(){
    playing = false;
    clearInterval(spawnTimer);
    clearInterval(countdownTimer);
    holes.forEach(h => { h.classList.remove('up'); h.textContent = ''; });
    document.getElementById('status').textContent = '🏁 Selesai! Skor akhir: ' + score;
  }
</script>
<script src="components/agen_alwi.js"></script>
</body>
</html>
