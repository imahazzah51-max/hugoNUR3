<body>

  <div class="phone-frame"></div>
  <div class="wallpaper"></div>

  <div class="statusbar">
    <span class="sb-time" id="sb-time">00:00</span>
    <div class="sb-icons"><span>📶</span><span>WiFi</span><span>🔋 99%</span></div>
  </div>

  <div class="clock-widget">
    <div class="clock-time" id="clock-time">00:00</div>
    <div class="clock-date" id="clock-date">Memuat Tanggal...</div>
  </div>

  <div class="search-wrap">
    <div class="search-bar">
      <span class="search-g">G</span>
      <input class="search-input" id="searchInput" placeholder="Cari di Google / Perintah Nur..." autocomplete="off">
      <span class="search-mic" id="micBtn">🎤</span>
      <button class="search-btn" id="searchBtn">Cari</button>
    </div>
    <div class="search-suggest" id="suggestions"></div>
  </div>

  <div class="scroll-area" id="mainScrollArea">
    </div>

  <div class="dock">
    <div class="dock-bar" id="dockContainer">
      </div>
    <div class="home-indicator"><div class="home-bar"></div></div>
  </div>

  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <div class="popup-header">
        <span class="popup-icon" id="p-icon">🌐</span>
        <div>
          <div class="popup-title" id="p-title">Sistem Nur Gateway</div>
          <div class="popup-url" id="p-url">about:blank</div>
        </div>
        <button class="popup-close" id="closePopupBtn">✕</button>
      </div>
      <iframe class="popup-iframe" id="p-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div class="popup-actions">
        <button class="popup-btn open" id="openExternalBtn">🔗 Buka di Browser</button>
        <button class="popup-btn cancel" id="cancelPopupBtn">Tutup</button>
      </div>
    </div>
  </div>

  <div class="dialer-overlay" id="dialer">
    <div class="dialer-box">
      <div class="dialer-handle"></div>
      <div class="dialer-display" id="dialDisplay">·  ·  ·</div>
      <div class="dialer-grid" id="dialerGrid">
        </div>
      <div class="dialer-actions">
        <button class="dial-del" id="dialDelBtn">⌫</button>
        <button class="dial-call" id="dialCallBtn">📞 PANGGIL</button>
        <div style="width:50px;"></div>
      </div>
      <div class="dial-close-row">
        <button class="dial-close" id="closeDialerBtn">Tutup Dialer</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
