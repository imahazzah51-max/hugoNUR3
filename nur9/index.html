<script>
// Cek status koneksi browser secara real-time
function updateSinyal() {
  const kon = document.getElementById('koneksi');
  if (navigator.onLine) {
    kon.innerHTML = "<span style='color:#0f0'>ONLINE (Siap kirim ke AI)</span>";
  } else {
    kon.innerHTML = "<span style='color:#f00'>OFFLINE (Gunakan SMS dulu)</span>";
  }
}
window.addEventListener('online', updateSinyal);
window.addEventListener('offline', updateSinyal);
updateSinyal();

// Fungsi simpan lokal (0 kuota)
function daftar(){
  if(!n.value || !w.value) return alert('Isi nama dan WA!');
  let d = JSON.parse(localStorage.jodoh||'[]');
  d.push({n:n.value,w:w.value});
  localStorage.jodoh = JSON.stringify(d);
  tampil Data();
  n.value = ''; w.value = '';
}

function tampilData() {
  let d = JSON.parse(localStorage.jodoh||'[]');
  list.innerHTML = d.map(x=>'• '+x.n+' | WA: '+x.w+'<br>').join('');
}
// Load data otomatis saat dibuka
tampilData();
