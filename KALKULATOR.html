}

  }

  .corner {

  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* Ripple effect */

<div class="wrapper">
  <div class="header">
    <div class="ornament">✦ ❧ ✦</div>
    <h1>Pasar Indramayu<br>Club Makrifat</h1>
    <div class="sub">Kalkulator Berkah</div>
  </div>

  <div class="calc">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="btn-sp" onclick="clearAll()">AC</button>
      <button class="btn-sp" onclick="toggleSign()">+/-</button>
      <button class="btn-sp" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOp('÷')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="num('7')">7</button>
      <button class="btn-num" onclick="num('8')">8</button>
      <button class="btn-num" onclick="num('9')">9</button>
      <button class="btn-op" onclick="setOp('×')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="num('4')">4</button>
      <button class="btn-num" onclick="num('5')">5</button>
      <button class="btn-num" onclick="num('6')">6</button>
      <button class="btn-op" onclick="setOp('−')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="num('1')">1</button>
      <button class="btn-num" onclick="num('2')">2</button>
      <button class="btn-num" onclick="num('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span2" onclick="num('0')">0</button>
      <button class="btn-num" onclick="dot()">.</button>
      <button class="btn-eq" onclick="calc()">=</button>
    </div>
  </div>

  <div class="footer">✦ بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم ✦</div>
</div>

<script>
  let cur = '0', prev = '', op = '', shouldReset = false;

  const disp  = document.getElementById('result');
  const expr  = document.getElementById('expr');

  function updateDisplay(val) {
    disp.textContent = format(val);
    const len = String(format(val)).length;
    disp.className = 'result' + (len > 12 ? ' bigger' : len > 8 ? ' big' : '');
    disp.classList.add('pulse');
    setTimeout(() => disp.classList.remove('pulse'), 200);
  }

  function format(n) {
    if (n === 'Error') return 'Error';
    const s = String(n);
    // Only format if it's a complete number (not mid-entry with trailing dot)
    if (s.endsWith('.') || (s.includes('.') && s.endsWith('0'))) return s;
    const num = parseFloat(n);
    if (isNaN(num)) return s;
    if (Math.abs(num) >= 1e15) return num.toExponential(4);
    return num.toLocaleString('id-ID', { maximumFractionDigits: 10 });
  }

  function num(d) {
    rippleBtn(event);
    if (shouldReset) { cur = d === '.' ? '0' : d; shouldReset = false; }
    else if (cur === '0' && d !== '.') cur = d;
    else if (cur.length < 18) cur += d;
    updateDisplay(cur);
  }

  function dot() {
    rippleBtn(event);
    if (shouldReset) { cur = '0.'; shouldReset = false; }
    else if (!cur.includes('.')) cur += '.';
    updateDisplay(cur);
  }

  function setOp(o) {
    rippleBtn(event);
    if (op && !shouldReset) calculate();
    prev = cur; op = o; shouldReset = true;
    expr.textContent = format(prev) + ' ' + o;
  }

  function calculate() {
    if (!op || !prev) return;
    const a = parseFloat(prev), b = parseFloat(cur);
    let res;
    if (op === '+')  res = a + b;
    if (op === '−')  res = a - b;
    if (op === '×')  res = a * b;
    if (op === '÷')  res = b === 0 ? 'Error' : a / b;
    expr.textContent = format(prev) + ' ' + op + ' ' + format(cur) + ' =';
    cur = res === 'Error' ? 'Error' : String(+res.toFixed(10));
    op = ''; prev = ''; shouldReset = true;
    updateDisplay(cur);
  }

  function calc() {
    rippleBtn(event);
    calculate();
  }

  function clearAll() {
    rippleBtn(event);
    cur = '0'; prev = ''; op = ''; shouldReset = false;
    expr.textContent = '';
    updateDisplay('0');
  }

  function toggleSign() {
    rippleBtn(event);
    if (cur === '0' || cur === 'Error') return;
    cur = String(-parseFloat(cur));
    updateDisplay(cur);
  }

  function percent() {
    rippleBtn(event);
    if (cur === 'Error') return;
    cur = String(parseFloat(cur) / 100);
    updateDisplay(cur);
  }

  function rippleBtn(e) {
    if (!e || !e.currentTarget) return;
    const btn = e.currentTarget;
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${(rect.width-size)/2}px;top:${(rect.height-size)/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 450);
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    const k = e.key;
    if ('0123456789'.includes(k))      { num(k); }
    else if (k === '.')                { dot(); }
    else if (k === '+')                { setOp('+'); }
    else if (k === '-')                { setOp('−'); }
    else if (k === '*')                { setOp('×'); }
    else if (k === '/')                { e.preventDefault(); setOp('÷'); }
    else if (k === 'Enter' || k === '=') { calc(); }
    else if (k === 'Backspace')        { if (!shouldReset && cur.length > 1) cur = cur.slice(0,-1); else cur = '0'; updateDisplay(cur); }
    else if (k === 'Escape')           { clearAll(); }
    else if (k === '%')                { percent(); }
  });

// 2. SUARA AZAN GENERATOR (SINE WAVE - TANPA FILE EKSTERNAL)
// ═══════════════════════════════════════════════════════════════════

let audioContext = null;

function getAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }
  return audioContext;
}

function playAzanSound() {
  if (!AGEN_ALWI_CONFIG.suara_enabled) return;
  
  try {
    const ctx = getAudioContext();
    
    // Melodi Azan (Adhan) - 5 nada untuk 5 waktu shalat
    const melodi = [
      { freq: 220, durasi: 0.5 },  // A3
      { freq: 247, durasi: 0.5 },  // B3
      { freq: 294, durasi: 0.5 },  // D4
      { freq: 330, durasi: 0.5 },  // E4
      { freq: 392, durasi: 0.8 }   // G4
    ];
    
    let currentTime = ctx.currentTime;
    
    melodi.forEach(nada => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(nada.freq, currentTime);
      
      gain.gain.setValueAtTime(0.3, currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, currentTime + nada.durasi);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      osc.start(currentTime);
      osc.stop(currentTime + nada.durasi);
      
      currentTime += nada.durasi + 0.1;
    });
  } catch (e) {
    console.log('Suara azan diblokir browser (normal pada beberapa kondisi)');
  }
}

          <input

            style="

          <button onclick="kirimPesanKeAlwi()" style="
            background: linear-gradient(135deg, #c9a84c, #ffd700);

  setTimeout(() => {

// ═══════════════════════════════════════════════════════════════════
// 4. FUNGSI TOGGLE WINDOW CHAT
// ═══════════════════════════════════════════════════════════════════

function toggleAgenAlwi() {
  const window_chat = document.getElementById('agenAlwiWindow');
  const toggle_btn = document.getElementById('agenAlwiToggle');
  
  if (!window_chat) return;
  
  if (window_chat.style.display === 'none' || window_chat.style.display === '') {
    window_chat.style.display = 'flex';
    toggle_btn.style.transform = 'scale(0.8)';
    // Auto focus input
    setTimeout(() => {
      document.getElementById('agenAlwiInput').focus();
    }, 200);
  } else {
    window_chat.style.display = 'none';
    toggle_btn.style.transform = 'scale(1)';
  }
}

// ═══════════════════════════════════════════════════════════════════
// 5. TAMBAH PESAN CHAT
// ═══════════════════════════════════════════════════════════════════

function tambahPesanAlwi(teks, dariUser = false) {
  const chatDiv = document.getElementById('agenAlwiChat');
  if (!chatDiv) return;
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `alwi-message ${dariUser ? 'msg-user' : 'msg-alwi'}`;
  
  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = dariUser ? '👤' : '🤖';
  
  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'msg-bubble';
  bubbleDiv.textContent = teks;
  
  if (!dariUser) {
    msgDiv.appendChild(avatarDiv);
    msgDiv.appendChild(bubbleDiv);
  } else {
    msgDiv.appendChild(bubbleDiv);
    msgDiv.appendChild(avatarDiv);
  }
  
  chatDiv.appendChild(msgDiv);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════════
// 6. KIRIM PESAN & PROSES RESPONS
// ═══════════════════════════════════════════════════════════════════

function kirimPesanKeAlwi() {
  const input = document.getElementById('agenAlwiInput');
  const teks = input.value.trim();
  
  if (!teks) return;
  
  // Tampilkan pesan user
  tambahPesanAlwi(teks, true);
  input.value = '';
  
  // Simulasi delay respons Alwi
  setTimeout(() => {
    const respons = prosesKatalkunci(teks.toLowerCase());
    tambahPesanAlwi(respons);
  }, 800);
}

function prosesKatalkunci(teks) {
  // MENU UTAMA
  if (teks.includes('menu') || teks.includes('layanan') || teks.includes('apa saja')) {
    return 'Pilih salah satu layanan di bawah ini:\n\n' + 
           Object.values(MENU_LAYANAN)
             .map(m => `${m.emoji} ${m.label}`)
             .join('\n') +
           '\n\n(Ketik nama layanan untuk membuka)';
  }
  
  // CARI DI MENU
  for (const [key, menu] of Object.entries(MENU_LAYANAN)) {
    if (teks.includes(key.toLowerCase()) || 
        teks.includes(menu.label.toLowerCase().split(' ')[0])) {
      
      // BUKA HALAMAN
      setTimeout(() => {
        window.location.href = menu.url;
      }, 1000);
      
      return `✅ Membuka ${menu.label}...\n${menu.desc}`;
    }
  }
  
  // JADWAL SHALAT
  if (teks.includes('jadwal') || teks.includes('azan') || teks.includes('waktu shalat')) {
    let jadwal = '🕌 JADWAL SHALAT INDRAMAYU\n\n';
    for (const [_, shalat] of Object.entries(JADWAL_AZAN)) {
      jadwal += `${shalat.nama}: ${shalat.waktu}\n`;
    }
    return jadwal;
  }
  
  // PUTAR AZAN
  if (teks.includes('putar azan') || teks.includes('dengarkan azan')) {
    playAzanSound();
    return '🔊 Suara Azan sedang diputar...\n\n"ALLAHU AKBAR.. ALLAHU AKBAR.."';
  }
  
  // INFO CLUB
  if (teks.includes('tentang') || teks.includes('siapa') || teks.includes('apa itu')) {
    return `Indramayu Club adalah komunitas digital yang menghadirkan:\n\n` +
           `✨ Kamus Bahasa Indramayu\n` +
           `💰 Sistem Poin (Nur, GIF, Voucher)\n` +
           `🎭 Live Streaming Member\n` +
           `🕌 Jadwal Azan Otomatis\n` +
           `🤝 Forum Diskusi Ramah\n\n` +
           `Bergabunglah dengan kami! 🌿`;
  }
  
  // SALAM
  if (teks.includes('halo') || teks.includes('hai') || teks.includes('assalam')) {
    const sapaan = ['Wa\'alaikum assalam wa rahmatullahi wa barakatuh! 🌙',
                    'Halo juga! Ada yang bisa dibantu? 😊',
                    'Selamat datang di Indramayu Club! 🌿'];
    return sapaan[Math.floor(Math.random() * sapaan.length)];
  }
  
  // TERIMA KASIH
  if (teks.includes('terimakasih') || teks.includes('makasih') || teks.includes('trims')) {
    return 'Sama-sama! Senang melayani Anda. 🙏\n\nAda yang perlu dibantu lagi?';
  }
  
  // DEFAULT - TAMPILKAN MENU DROPDOWN
  return `Maaf, saya belum memahami. 🤔\n\nSilakan ketik "menu" untuk melihat layanan kami, atau tanyakan:\n\n• Jadwal Shalat\n• Tentang Indramayu Club\n• Atau nama layanan (kamus, dashboard, live member, dll)`;
}

// ═══════════════════════════════════════════════════════════════════
// 7. SISTEM AZAN OTOMATIS (CEK SETIAP MENIT)
// ═══════════════════════════════════════════════════════════════════

function setupSystemAzan() {
  setInterval(() => {
    const now = new Date();
    const jamSekarang = String(now.getHours()).padStart(2, '0') + ':' +
                        String(now.getMinutes()).padStart(2, '0');
    
    for (const [key, shalat] of Object.entries(JADWAL_AZAN)) {
      if (jamSekarang === shalat.waktu) {
        // PUTAR SUARA
        playAzanSound();
        
        // NOTIF KE BOT
        tambahPesanAlwi(`🕌 ADZAN ${shalat.nama.toUpperCase()}\n\n"ALLAHU AKBAR ALLAHU AKBAR..."\n\nSaatnya melaksanakan shalat ${shalat.nama}! ✨`, false);
        
        // TAMPILKAN TOAST
        showAzanToast(shalat.nama);
        
        break;
      }
    }
  }, 60000); // Cek setiap 1 menit
}

function showAzanToast(namaAzan) {
  const toast = document.createElement('div');
  toast.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #06140b, #0a2e1c);
    border: 2px solid #ffd700;
    color: #ffd700;
    padding: 16px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    z-index: 99999;
    box-shadow: 0 6px 20px rgba(201,168,76,0.4);
    animation: slideDown 0.4s ease;
  `;
  
  toast.textContent = `🕌 Saatnya Azan ${namaAzan} — Allahu Akbar!`;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.4s ease';
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// 8. INISIALISASI SAAT DOM READY
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
  renderAgenAlwiBot();
  setupSystemAzan();
});

// Export API
window.AgenAlwi = {
  toggle: toggleAgenAlwi,
  kirimPesan: kirimPesanKeAlwi,
  tambahPesan: tambahPesanAlwi,
  playAzan: playAzanSound,
  showToast: showAzanToast
};


</script>
