<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Indramayu Club TV - Video Generator</title>
    <style>
        body {
            background-color: #0a1a10; /* Hijau gelap Makrifat */
            color: #d4af37; /* Warna Emas Sultan */
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 50px;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 30px;
            display: inline-block;
        }
        h1 { text-transform: uppercase; }
        .status { color: #00ff00; font-weight: bold; }

.gambar-bergerak {
    width: 640px;
    height: 640px;
    overflow: hidden;
    border: 2px solid #d4af37;
}

.gambar-bergerak img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: zoomEfek 10s infinite alternate;
}

@keyframes zoomEfek {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

 </style>
</head>
<body>
<video width="640" height="640" controls>
  <source src="03_ADM_KEUANGAN/hasil_panggung_tv.mp4" type="video/mp4">
  Browser Anda tidak mendukung tag video.
</video>


  <div class="container">
        <h1>INDRAMAYU CLUB TV</h1>
        <p>[ Simulasi Drive3 - Video Generator ]</p>
        <p>Status: <span class="status">Panggung Sultan Aktif</span></p>
        <hr style="border: 1px solid #d4af37;">
        <p>Sistem: FFmpeg Engine Terintegrasi</p>
        <p>Output: <i>hasil_panggung_tv.mp4</i></p>
        <p>Selesai Mandali 100%</p>
    </div>

<div class="container">
    <h3>Unggah Aset Makrifat</h3>
    <input type="file" id="uploadInput" accept="image/*">

    <div class="gambar-bergerak" id="wadahGambar">
        <img id="gambarTampil" src="placeholder.jpg" alt="Preview">
    </div>
</div>
<button onclick="tombolGenerate()" style="padding: 15px; background: #d4af37; cursor: pointer;">
    JALANKAN GENERATOR VIDEO
</button>

<script>
async function tombolGenerate() {
    const fileInput = document.getElementById('uploadInput');
    if (!fileInput.files[0]) {
        alert("Pilih gambar dulu sebelum generate.");
        return;
    }
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        // 1. Upload dulu
        alert("Mengunggah aset...");
        const uploadRes = await fetch('/upload', { method: 'POST', body: formData });
        if (!uploadRes.ok) {
            throw new Error('Upload gagal, status ' + uploadRes.status);
        }

        // 2. Jalankan generator
        alert("Sedang memproses video...");
        const res = await fetch('/generate');
        if (!res.ok) {
            throw new Error('Generate gagal, status ' + res.status);
        }
        const data = await res.json();
        alert(data.message);
        if (data.status === 'sukses') {
            location.reload();
        }
    } catch (err) {
        alert("Gagal terhubung ke server: " + err.message);
        console.error(err);
    }
}

  // Script sederhana untuk preview gambar yang diunggah
    document.getElementById('uploadInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('gambarTampil').src = event.target.result;
        }
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
