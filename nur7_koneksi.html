<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koneksi Utama - Server Alwi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    :root {
      --mustard: #e8a838;
      --burnt: #cf5c26;
      --avocado: #6f8c3e;
      --cream: #f4e8cf;
      --brown: #3a2317;
      --dark: #06140b;
    }
    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Special Elite', monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: #0a2e1c;
      border: 4px solid var(--mustard);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 {
      font-family: 'Bungee', cursive;
      color: var(--mustard);
      font-size: 22px;
      margin-bottom: 5px;
    }
    .status-box {
      background: var(--dark);
      border: 2px solid var(--avocado);
      border-radius: 12px;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px dashed rgba(201, 168, 76, 0.2);
      padding-bottom: 8px;
    }
    .status-item:last-child {
      border: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 11px;
    }
    .badge-online {
      background: var(--avocado);
      color: #fff;
    }
    .badge-checking {
      background: var(--mustard);
      color: var(--dark);
    }
    .badge-offline {
      background: var(--burnt);
      color: #fff;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: var(--mustard);
      color: var(--dark);
      border: none;
      border-radius: 10px;
      font-family: 'Bungee', cursive;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #ffd700;
    }
  </style>

  
  <script src="./03_ADM_KEUANGAN/radar.js"></script>
</head>
<body>

<div class="container">
  <h1>📡 MONITOR KONEKSI ALWI</h1>
  <p style="font-size: 11px; color: var(--mustard)">Pusat Kendali Jaringan Akademik Indramayu Club</p>

  <div class="status-box">
    <div class="status-item">
      <span>🖥️ Server Backend (Port 8882):</span>
      <span id="server-status" class="badge badge-checking">MEMERIKSA...</span>
    </div>
    <div class="status-item">
      <span>🤖 Agen Alwi (Client UI):</span>
      <span class="badge badge-online">SIAP AKTIF</span>
    </div>
    <div class="status-item">
      <span>📂 Lokasi Log:</span>
      <span style="font-size: 11px; color: #fff;">log_member.json</span>
    </div>
  </div>

  <button class="btn" onclick="cekKoneksiServer()">🔄 SEGERAKAN CEK ULANG</button>
  <a href="index.html" class="btn" style="margin-top: 10px; background: transparent; border: 2px solid var(--mustard); color: var(--mustard);">⬅️ KEMBALI KE PORTAL</a>
</div>

<!-- Memanggil script visual Agen Alwi -->
<script src="components/agen_alwi.js"></script>

<script>
  // Fungsi otomatis untuk menembak status server Alwi di port 8882
  function cekKoneksiServer() {
    const statusLabel = document.getElementById('server-status');
    statusLabel.className = 'badge badge-checking';
    statusLabel.textContent = 'MEMERIKSA...';

    fetch('http://localhost:8882/status')
      .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(data => {
        statusLabel.className = 'badge badge-online';
        statusLabel.textContent = 'ONLINE (PORT 8882)';
        if (window.tambahPesanAlwiRaw) {
          window.tambahPesanAlwiRaw("Koneksi berhasil terjalin sempurna dengan Server Alwi di Port 8882!");
        }
      })
      .catch(() => {
        statusLabel.className = 'badge badge-offline';
        statusLabel.textContent = 'OFFLINE / MATI';
      });
  }

  // Jalankan cek koneksi saat halaman pertama kali dimuat
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(cekKoneksiServer, 1000);
  });
</script>

</body>
</html>
