<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamus Indramayu · Agent Alwi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & VARIABEL
══════════════════════════════════════════ */
:root {
  --emas       : #c9a84c;
  --emas-muda  : #f0d070;
  --emas-tua   : #7a5c1e;
  --hitam      : #0d0d0d;
  --gelap      : #1a1408;
  --kartu      : #1e1608;
  --border     : #3a2c0a;
  --teks       : #e8d5a0;
  --teks-redup : #9a8050;
  --hijau      : #1a6b3a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Noto Sans', sans-serif;
  background: var(--hitam);
  background-image:
    radial-gradient(ellipse at 10% 10%, #1a0f0220 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, #0a1a0520 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9a84c' stroke-width='0.3' opacity='0.12'%3E%3Cpath d='M30 5 L55 30 L30 55 L5 30 Z'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3Cpath d='M30 5 L30 55 M5 30 L55 30'/%3E%3Cpath d='M10 10 L50 50 M50 10 L10 50'/%3E%3C/g%3E%3C/svg%3E");
  color: var(--teks);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  background: linear-gradient(135deg, #0d0a02, #1a1408, #0d0a02);
  border-bottom: 2px solid var(--emas-tua);
  padding: 14px 20px 12px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(201,168,76,0.15);
  position: sticky; top: 0; z-index: 100;
}
.bismillah {
  font-size: 14px; color: var(--emas);
  opacity: 0.7; margin-bottom: 4px; letter-spacing: 2px;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 5vw, 26px);
  background: linear-gradient(135deg, var(--emas-tua), var(--emas), var(--emas-muda), var(--emas));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: 3px;
}
.header-sub { font-size: 10px; color: var(--teks-redup); letter-spacing: 4px; margin-top: 3px; }
.agent-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, var(--emas-tua), var(--emas));
  color: #000; font-size: 10px; font-weight: 700;
  padding: 3px 12px; border-radius: 20px; letter-spacing: 1px; margin-top: 6px;
}

/* ══════════════════════════════════════════
   NAV LINKS
══════════════════════════════════════════ */
.nav-links {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; padding: 8px 16px 0;
}
.nav-link {
  background: rgba(201,168,76,0.08);
  border: 1px solid var(--emas-tua);
  color: var(--emas); font-size: 10px;
  padding: 4px 12px; border-radius: 20px;
  text-decoration: none; letter-spacing: 1px;
  transition: all 0.2s;
}
.nav-link:hover { background: var(--emas-tua); color: #000; }

/* ══════════════════════════════════════════
   TICKER
══════════════════════════════════════════ */
.ticker-wrap {
  background: linear-gradient(135deg, #1a3a2a, #0d2010);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  padding: 5px 0; overflow: hidden; position: relative;
}
.ticker-label {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--emas); color: #000;
  font-size: 9px; font-weight: 800; letter-spacing: 1px;
  padding: 0 10px; display: flex; align-items: center; z-index: 2;
}
.ticker-track {
  display: flex; animation: ticker 28s linear infinite;
  padding-left: 80px; white-space: nowrap;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  font-size: 11px; color: var(--emas);
  padding: 0 24px; cursor: pointer; letter-spacing: 0.5px;
}
.ticker-item:hover { color: var(--emas-muda); }
.ticker-item span { color: rgba(255,255,255,0.5); font-size: 10px; margin-left: 3px; }
@keyframes ticker {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ══════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════ */
.main { flex: 1; max-width: 680px; margin: 0 auto; padding: 20px 16px; width: 100%; }

/* ══════════════════════════════════════════
   SEARCH BOX
══════════════════════════════════════════ */
.search-wrap { display: flex; gap: 8px; margin-bottom: 10px; }

#inputKata {
  flex: 1;
  background: var(--kartu);
  border: 1.5px solid var(--emas-tua);
  color: var(--teks);
  font-size: 18px;
  font-family: 'Noto Sans', sans-serif;
  padding: 13px 18px;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  letter-spacing: 1px;
}
#inputKata::placeholder { color: var(--teks-redup); }
#inputKata:focus {
  border-color: var(--emas);
  box-shadow: 0 0 16px rgba(201,168,76,0.2);
}

.btn {
  background: linear-gradient(135deg, var(--emas-tua), var(--emas));
  color: #000; border: none;
  padding: 13px 16px; border-radius: 10px;
  font-size: 18px; cursor: pointer; font-weight: 700;
  transition: all 0.2s; flex-shrink: 0;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(201,168,76,0.4); }
.btn:active { transform: scale(0.96); }
.btn.recording { background: linear-gradient(135deg, #c0392b, #e74c3c); color: #fff; }

/* ══════════════════════════════════════════
   TOMBOL BAWAH SEARCH
══════════════════════════════════════════ */
.tools-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

.tool-btn {
  flex: 1; min-width: 100px;
  background: transparent;
  border: 1px solid var(--emas-tua);
  color: var(--emas); padding: 8px 10px;
  border-radius: 8px; font-size: 12px;
  cursor: pointer; letter-spacing: 1px;
  transition: all 0.2s; white-space: nowrap;
}
.tool-btn:hover { background: var(--emas-tua); color: #000; }

/* ══════════════════════════════════════════
   FILTER KATEGORI
══════════════════════════════════════════ */
.filter-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.filter-chip {
  background: var(--kartu);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; color: var(--teks-redup);
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
}
.filter-chip:hover, .filter-chip.aktif {
  border-color: var(--emas); color: var(--emas); background: var(--gelap);
}
.filter-chip span { color: var(--emas); font-weight: 700; margin-left: 3px; }

/* ══════════════════════════════════════════
   STATUS BAR
══════════════════════════════════════════ */
.status-bar {
  text-align: center; font-size: 12px;
  color: var(--teks-redup); margin-bottom: 14px;
  letter-spacing: 1px; min-height: 18px;
}
.status-bar.ok    { color: #51cf66; }
.status-bar.err   { color: #ff6b6b; }
.status-bar.info  { color: var(--emas); }

/* ══════════════════════════════════════════
   KARTU HASIL
══════════════════════════════════════════ */
.kartu {
  background: linear-gradient(135deg, var(--kartu), #150f03);
  border: 1.5px solid var(--emas-tua);
  border-radius: 14px; padding: 22px;
  box-shadow: 0 8px 32px rgba(201,168,76,0.1),
              inset 0 1px 0 rgba(201,168,76,0.15);
  animation: fadeIn 0.35s ease;
  margin-bottom: 12px;
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(-10px); }
  to   { opacity:1; transform: translateY(0); }
}

.kartu-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 14px; gap: 10px;
}
.kata-utama {
  font-family: 'Cinzel', serif;
  font-size: clamp(24px, 7vw, 36px);
  color: var(--emas); letter-spacing: 3px;
  line-height: 1.1;
}
.badge-kat {
  background: var(--emas-tua); color: var(--emas-muda);
  font-size: 10px; padding: 4px 10px;
  border-radius: 20px; letter-spacing: 1px;
  font-weight: 600; white-space: nowrap; flex-shrink: 0;
}

.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

.baris {
  display: grid; grid-template-columns: 100px 1fr;
  gap: 6px; margin-bottom: 10px; align-items: start;
}
.lbl {
  font-size: 10px; color: var(--teks-redup);
  text-transform: uppercase; letter-spacing: 2px; padding-top: 3px;
}
.val       { font-size: 17px; color: var(--teks); line-height: 1.5; }
.val-pasar { font-size: 14px; color: var(--emas-muda); font-style: italic; line-height: 1.5; }

/* TTS BUTTONS */
.tts-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.tts-btn {
  display: flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--emas-tua);
  color: var(--emas); padding: 8px 14px;
  border-radius: 8px; font-size: 12px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.tts-btn:hover   { background: var(--emas); color: #000; }
.tts-btn.playing { background: var(--emas); color: #000; animation: pulse 1s infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
  50%      { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
}

/* CONTOH KALIMAT */
.contoh-box {
  margin-top: 14px;
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 8px; padding: 12px 14px;
  font-size: 13px; color: var(--teks-redup);
  font-style: italic; line-height: 1.6;
  display: none;
}
.contoh-box.show { display: block; animation: fadeIn 0.3s ease; }
.contoh-kata { color: var(--emas); font-weight: 600; font-style: normal; }

/* ══════════════════════════════════════════
   MIRIP / TIDAK ADA
══════════════════════════════════════════ */
.mirip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px; margin-top: 10px;
}
.mirip-item {
  background: var(--kartu); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  cursor: pointer; transition: all 0.2s;
}
.mirip-item:hover {
  border-color: var(--emas); background: var(--gelap);
  transform: translateY(-2px);
}
.mi-kata { font-size: 14px; color: var(--emas); font-weight: 600; }
.mi-arti { font-size: 11px; color: var(--teks-redup); margin-top: 2px; }

/* ══════════════════════════════════════════
   BROWSER LIST (tampil saat filter kategori)
══════════════════════════════════════════ */
.browser-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 20px;
}

/* ══════════════════════════════════════════
   HISTORY PENCARIAN
══════════════════════════════════════════ */
.history-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.history-chip {
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; color: var(--teks-redup);
  cursor: pointer; transition: all 0.2s;
}
.history-chip:hover { border-color: var(--emas); color: var(--emas); }

/* ══════════════════════════════════════════
   ORNAMEN
══════════════════════════════════════════ */
.ornamen {
  text-align: center; color: var(--emas-tua);
  font-size: 16px; letter-spacing: 8px;
  margin: 10px 0; opacity: 0.5;
}

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
footer {
  text-align: center; padding: 20px 16px;
  color: var(--teks-redup); font-size: 11px;
  letter-spacing: 2px; border-top: 1px solid var(--border);
  margin-top: auto;
}

/* ══════════════════════════════════════════
   RIPPLE EFFECT
══════════════════════════════════════════ */
.ripple {
  position: fixed; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(201,168,76,0.25), transparent);
  animation: rippleAnim 0.7s ease-out forwards; z-index: 9999;
}
@keyframes rippleAnim {
  from { width:0; height:0; opacity:1; transform:translate(-50%,-50%); }
  to   { width:120px; height:120px; opacity:0; transform:translate(-50%,-50%); }
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 480px) {
  .baris { grid-template-columns: 80px 1fr; }
  .tts-btn { font-size: 11px; padding: 7px 10px; }
}

/* ══════════════════════════════════════════
   PROPERTI NUR AI MELAYANG (GIF & RP NUR)
══════════════════════════════════════════ */
.gifnur-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  text-align: center;
  pointer-events: auto;
}
.gifnur-img {
  width: 85px;
  height: 85px;
  filter: drop-shadow(0 0 12px var(--emas));
  animation: nurTerbang 3s ease-in-out infinite;
  cursor: pointer;
  border-radius: 50%;
}
@keyframes nurTerbang {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-15px) scale(1.05); }
}
.nur-speech-bubble {
  background: linear-gradient(135deg, var(--kartu), #0d0d0d);
  border: 1px solid var(--emas);
  color: var(--teks);
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 11px;
  margin-bottom: 8px;
  max-width: 160px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  font-family: 'Noto Sans', sans-serif;
  border-bottom-right-radius: 2px;
}


</style>

</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="bismillah">﷽</div>
  <h1>KAMUS INDRAMAYU</h1>
  <div class="header-sub">BASA DERMAYU · PASAR · INDONESIA</div>
  <div class="agent-badge">🤖 AGENT ALWI · PENJAGA KAMUS</div>
  <div class="nav-links">
    <a class="nav-link" href="?page=komunitas">🏠 Komunitas</a>
    <a class="nav-link" href="?page=android">📱 Home</a>
    <a class="nav-link" href="?page=dashboard">👤 Dashboard</a>
    <a class="nav-link" href="?page=admin">⚙️ Admin</a>
  </div>
</header>

<!-- ═══ TICKER ═══ -->
<div class="ticker-wrap">
  <div class="ticker-label">📖 BASA DERMAYU</div>
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <div class="ornamen">❧ ✦ ❧</div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" id="inputKata"
      placeholder="Ketik kata Indramayu…"
      autocomplete="off" autocapitalize="none"
      oninput="onInput()" onkeydown="if(event.key==='Enter')cari()">
    <button class="btn" onclick="cari()" title="Cari">🔍</button>
    <button class="btn" id="btnMic" onclick="toggleMic()" title="Input Suara">🎤</button>
  </div>

  <!-- TOOLS ROW -->
  <div class="tools-row">
    <button class="tool-btn" onclick="acakKata()">🎲 Kata Acak</button>
    <button class="tool-btn" onclick="showContoh()">💬 Contoh Kalimat</button>
    <button class="tool-btn" onclick="clearHasil()">🗑️ Hapus</button>
  </div>

  <!-- FILTER KATEGORI -->
  <div class="filter-row" id="filterRow">
    <div class="filter-chip aktif" onclick="filterKat('',this)">
      📚 Semua <span id="totalChip">0</span>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-row" id="historyRow" style="display:none"></div>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar">⏳ Memuat kamus...</div>

  <!-- HASIL -->
  <div id="hasilBox"></div>

  <!-- BROWSER LIST -->
  <div class="browser-grid" id="browserGrid"></div>

</div><!-- end main -->

<div class="ornamen" style="margin:0 0 8px">✦ ✦ ✦</div>
<!-- Elemen Avatar Nur AI Melayang -->
<div class="gifnur-container" id="gifNurContainer" onclick="ttsPlay('Hadir pak dulKohar. Sila masukkan kode voucher atau cari kata di kolom atas.', 'id')">
  <div class="nur-speech-bubble" id="bubbleNur">Hadir pak dulKohar! 🤖</div>
  <!-- Menggunakan GIF Avatar AI Spiritual (Bisa diganti URL GIF Bapak sendiri) -->
  <img src="https://i.gifer.com/ZKZg.gif" class="gifnur-img" alt="Nur AI">
</div>



<footer>
  ✦ Indramayu Club Makrifat · Agent Alwi v2.0 ✦<br>
  <span style="font-size:10px;opacity:0.5;margin-top:4px;display:block;">
    Nguri-uri Budaya lan Basa Indramayu
  </span>
</footer>

<script>
// ══════════════════════════════════════════════════════
// KONFIGURASI
// ══════════════════════════════════════════════════════
// Ganti dengan URL deploy GAS Anda
const GAS_URL = (function() {
  // Jika file ini dijalankan dari GAS (sudah di-inject URL-nya)
  if (window.GAS_SCRIPT_URL) return window.GAS_SCRIPT_URL;
  // Jika standalone local / testing
  return window.location.href.split('?')[0];
})();

// ══════════════════════════════════════════════════════
// DATA KAMUS LOKAL (fallback jika GAS tidak tersedia)
// ══════════════════════════════════════════════════════
const kamusLokal = {
  "kula":      { indonesia:"saya",               pasar:"kula (formal)",              kategori:"Kata Ganti" },
  "isun":      { indonesia:"aku",                pasar:"reang / isun",               kategori:"Kata Ganti" },
  "sira":      { indonesia:"kamu",               pasar:"ira / sira",                 kategori:"Kata Ganti" },
  "rika":      { indonesia:"kamu (sopan/tua)",   pasar:"rika",                       kategori:"Kata Ganti" },
  "sampeyan":  { indonesia:"anda",               pasar:"sampeyan",                   kategori:"Kata Ganti" },
  "deweke":    { indonesia:"dia",                pasar:"deweke / wonge",             kategori:"Kata Ganti" },
  "reang":     { indonesia:"saya/aku (akrab)",   pasar:"reang",                      kategori:"Kata Ganti" },
  "ira":       { indonesia:"kamu (akrab)",       pasar:"ira",                        kategori:"Kata Ganti" },
  "sapa":      { indonesia:"siapa",              pasar:"sapa / sapane",              kategori:"Kata Tanya" },
  "pira":      { indonesia:"berapa",             pasar:"pira",                       kategori:"Kata Tanya" },
  "priben":    { indonesia:"bagaimana",          pasar:"priben / kepriben / priwe",  kategori:"Kata Tanya" },
  "ngendi":    { indonesia:"di mana",            pasar:"ngendi / nendi",             kategori:"Kata Tanya" },
  "mengkene":  { indonesia:"begini",             pasar:"mengkene / ngene",           kategori:"Penunjuk"   },
  "mengkonon": { indonesia:"begitu",             pasar:"mengkonon / ngonon",         kategori:"Penunjuk"   },
  "kene":      { indonesia:"sini",               pasar:"kene",                       kategori:"Penunjuk"   },
  "kono":      { indonesia:"situ",               pasar:"kono",                       kategori:"Penunjuk"   },
  "kana":      { indonesia:"sana",               pasar:"kana",                       kategori:"Penunjuk"   },
  "iki":       { indonesia:"ini",                pasar:"iki / kene",                 kategori:"Penunjuk"   },
  "kuen":      { indonesia:"itu",                pasar:"kuen / kaen",                kategori:"Penunjuk"   },
  "mlaku":     { indonesia:"berjalan",           pasar:"mlaku",                      kategori:"Kata Kerja" },
  "turu":      { indonesia:"tidur",              pasar:"turu / merem",               kategori:"Kata Kerja" },
  "mangan":    { indonesia:"makan",              pasar:"mangan / madang / nguntal",  kategori:"Kata Kerja" },
  "nginum":    { indonesia:"minum",              pasar:"nginum / ngorong",           kategori:"Kata Kerja" },
  "adus":      { indonesia:"mandi",              pasar:"adus",                       kategori:"Kata Kerja" },
  "gawe":      { indonesia:"kerja / buat",       pasar:"gawe / kerja",               kategori:"Kata Kerja" },
  "tuku":      { indonesia:"beli",               pasar:"tuku",                       kategori:"Kata Kerja" },
  "tangi":     { indonesia:"bangun tidur",       pasar:"tangi",                      kategori:"Kata Kerja" },
  "lungguh":   { indonesia:"duduk",              pasar:"lungguh / ndodok",           kategori:"Kata Kerja" },
  "manjing":   { indonesia:"masuk",              pasar:"manjing",                    kategori:"Kata Kerja" },
  "metu":      { indonesia:"keluar",             pasar:"metu / mabor",               kategori:"Kata Kerja" },
  "mangkat":   { indonesia:"berangkat",          pasar:"mangkat / OTW",              kategori:"Kata Kerja" },

// ══════════════════════════════════════════════════════
// TTS — Google TTS + Web Speech fallback
// ══════════════════════════════════════════════════════
function ttsPlay(teks, lang = 'jv', btn = null) {
  if (audio) { audio.pause(); audio = null; }
  document.querySelectorAll('.tts-btn').forEach(b => b.classList.remove('playing'));

  const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${lang}&client=tw-ob&q=${encodeURIComponent(teks)}`;
  audio = new Audio(url);

  if (btn) btn.classList.add('playing');

  audio.play().catch(() => {
    // Fallback Web Speech API
    const u = new SpeechSynthesisUtterance(teks);
    u.lang = 'id-ID'; u.rate = 0.85; u.pitch = 1.0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
    setStatus('🔊 (Fallback) ' + teks, 'info');
  });

  audio.onplay  = () => setStatus('🔊 Memutar: "' + teks + '"', 'ok');
  audio.onended = () => {
    if (btn) btn.classList.remove('playing');
    setStatus('✅ Selesai', '');
  };
}

// ══════════════════════════════════════════════════════
// SPEECH RECOGNITION
// ══════════════════════════════════════════════════════
function toggleMic() {
  const btn = document.getElementById('btnMic');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    setStatus('⚠️ Browser tidak mendukung input suara', 'err'); return;
  }
  if (recognition) {
    recognition.stop(); recognition = null;
    btn.textContent = '🎤'; btn.classList.remove('recording'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'id-ID'; recognition.interimResults = false;
  recognition.onstart  = () => { btn.textContent = '🔴'; btn.classList.add('recording'); setStatus('🎤 Mendengarkan...', 'info'); };
  recognition.onresult = e => {
    const kata = e.results[0][0].transcript.toLowerCase().trim();
    document.getElementById('inputKata').value = kata;
    cari();
  };
  recognition.onerror  = () => { btn.textContent='🎤'; btn.classList.remove('recording'); recognition=null; };
  recognition.onend    = () => { btn.textContent='🎤'; btn.classList.remove('recording'); recognition=null; };
  recognition.start();
}

// ══════════════════════════════════════════════════════
async function cari() {
  const inp  = document.getElementById('inputKata');
  const kata = inp.value.toLowerCase().trim();
  if (!kata) return;

  document.getElementById('browserGrid').innerHTML = '';
  kataTerakhir = kata;
  setStatus('🔍 Mencari "' + kata + '"...', '');

  // Cari di kamus lokal
  const hasil = cariLokal(kata);

  if (hasil.status === 'ketemu') {
    tampilHasil(hasil);
    simpanHistory(kata);
  } else if (hasil.status === 'mirip') {
    tampilMirip(hasil);
  } else {
    tampilTidakAda(kata);
  }
}

function cariLokal(kata) {
  if (kamus[kata]) return { status:'ketemu', kata, ...kamus[kata] };
  const mirip = Object.entries(kamus)
    .filter(([k]) => k.includes(kata) || kata.includes(k.slice(0,3)))
    .map(([k,v]) => ({ kata:k, ...v }))
    .slice(0,9);
  if (mirip.length) return { status:'mirip', kata, hasil:mirip };
  return { status:'tidak_ada', kata };
}

function onInput() {
  const v = document.getElementById('inputKata').value.toLowerCase().trim();
  if (!v) { clearHasil(); return; }
  // Suggest saat ketik (3+ karakter)
  if (v.length >= 2) {
    const saran = Object.keys(kamus).filter(k => k.startsWith(v)).slice(0,5);
    // bisa ditambah autocomplete dropdown jika perlu
  }
}

function simpanHistory(kata) {
  searchHistory = [kata, ...searchHistory.filter(h => h !== kata)].slice(0, 8);
  localStorage.setItem('icm_kamus_history', JSON.stringify(searchHistory));
  renderHistory();
}

function renderHistory() {
  const row = document.getElementById('historyRow');
  if (!searchHistory.length) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  row.innerHTML = '<span style="font-size:10px;color:var(--teks-redup);align-self:center;letter-spacing:1px;white-space:nowrap;">🕐</span>'
    + searchHistory.map(k =>
        `<div class="history-chip" onclick="pilihKata('${k}')">${k}</div>`
      ).join('');
}

  const all  = [...data, ...data]; // duplikat untuk seamless

}

// FILTER CHIPS DARI KAMUS
// ══════════════════════════════════════════════════════
function initFilter() {
  const stats = {};
  const iconMap = {
    'Kata Ganti':'👤','Kata Tanya':'❓','Penunjuk':'👉',
    'Kata Kerja':'🏃','Kata Sifat':'🎨','Waktu':'🕐',
    'Umum':'📖','Partikel':'💬','Tukang':'🔨'
  };
  Object.values(kamus).forEach(v => { stats[v.kategori] = (stats[v.kategori]||0)+1; });

  const total = Object.keys(kamus).length;
  document.getElementById('totalChip').textContent = total;

  const row = document.getElementById('filterRow');
  Object.entries(stats).forEach(([k, n]) => {
    const ic  = iconMap[k] || '📝';
    const div = document.createElement('div');
    div.className = 'filter-chip';
    div.innerHTML = `${ic} ${k} <span>${n}</span>`;
    div.onclick   = () => filterKat(k, div);
    row.appendChild(div);
  });
}

// FUNGSI UTAMA: CARI KATA / DETEKSI VOUCHER
// ══════════════════════════════════════════════════════
async function cari() {
  const inp  = document.getElementById('inputKata');
  const kata = inp.value.toLowerCase().trim();
  if (!kata) return;

  document.getElementById('browserGrid').innerHTML = '';
  kataTerakhir = kata;

  // ── DETEKSI KODE VOUCHER GIF RPNUR ──
  // Melompati pencarian kamus jika ada unsur voucher
  if (kata.includes('rpnur') || kata.includes('gif')) {
    prosesVoucherICM(kata);
    return; // Stop di sini, aman dari kamus lokal
  }

  // ── PENCARIAN KAMUS BIASA ──
  setStatus('🔍 Mencari "' + kata + '"...', '');
  const hasil = cariLokal(kata);

  if (hasil.status === 'ketemu') {
    tampilHasil(hasil);
    simpanHistory(kata);
  } else if (hasil.status === 'mirip') {
    tampilMirip(hasil);
  } else {
    tampilTidakAda(kata);
  }
}

// ENGINE KHUSUS: VOUCHER NUR, KOIN NUR & GIF RP-NUR

function prosesVoucherICM(kode) {
  setStatus('🎫 Memvalidasi Voucher Digital...', 'info');
  
  // Mengubah teks bubble Nur secara dinamis
  const bubble = document.getElementById('bubbleNur');
  if (bubble) bubble.textContent = "Voucher terdeteksi! 🎁";

  // Notifikasi suara asisten Nur
  if (typeof ttsPlay === 'function') {
    ttsPlay('Mendeteksi kode hadiah. Mempersiapkan klaim koin nur menuju celengan.', 'id');
  }
  
  // Tentukan hadiah berdasarkan kata kunci yang diketik member
  let jenisHadiah = "GIFT RP-NUR DIGITAL";
  let detailHadiah = "Pengaktifan lencana otomatis dan fitur roleplay spiritual Indramayu Club.";
  let warnaTema = "#51cf66"; // Hijau
  let bgTema = "linear-gradient(135deg, #122b15, #0d0d0d)";

  if (kode.includes('koin')) {
    jenisHadiah = "KOIN NUR EMAS (BONUS TRADING)";
    detailHadiah = "Suntikan koin digital untuk saldo tambahan bermain atau disimpan di celengan member.";
    warnaTema = "#f0d070"; // Emas murni
    bgTema = "linear-gradient(135deg, #2b220a, #0d0d0d)";
  } else if (kode.includes('gif')) {
    jenisHadiah = "ANIMASI GIF NUR PROPERTI TERBANG";
    detailHadiah = "Sinkronisasi avatar melayang Nur AI agar aktif menetap di akun platform digital.";
  }

  // Render kotak klaim premium di dalam hasilBox kamus
  document.getElementById('hasilBox').innerHTML = `
    <div class="kartu" style="border-color: ${warnaTema}; background: ${bgTema};">
      <div class="kartu-top">
        <div class="kata-utama" style="color: ${warnaTema}; font-size: 20px; letter-spacing: 1px;">🎁 ${jenisHadiah}</div>
        <div class="badge-kat" style="background: ${warnaTema}; color: #000; font-weight:bold;">VOUCHER AKTIF</div>
      </div>
      <hr class="divider">
      <div style="text-align: center; padding: 10px 0;">
        <div style="font-size: 11px; color: var(--teks-redup); margin-bottom: 5px; letter-spacing: 1px;">KODE KLAIM:</div>
        <code style="font-size: 18px; color: var(--emas-muda); background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 6px; border: 1px dashed var(--emas);">
          ${kode.toUpperCase()}
        </code>
      </div>
      <p style="font-size: 13px; text-align: center; color: var(--teks); margin: 15px 0 10px; line-height: 1.5;">
        ${detailHadiah}
      </p>
      <hr class="divider">
      <div style="display: flex; gap: 8px; margin-top: 15px;">
        <button class="btn" style="flex: 1; font-size: 13px; padding: 10px; background: ${warnaTema}; color: #000;" onclick="klaimVoucherKeGAS('${kode}')">
          🚀 Ambil Hadiah
        </button>
        <button class="tool-btn" style="flex: 1;" onclick="clearHasilVoucher()">Batal</button>
      </div>
    </div>`;
}

// Fungsi batal klaim voucher (mengembalikan status bubble Nur)
function clearHasilVoucher() {
  clearHasil();
  const bubble = document.getElementById('bubbleNur');
  if (bubble) bubble.textContent = "Hadir pak dulKohar! 🤖";
}

// Fungsi eksekusi kirim data ke server Google Apps Script
function klaimVoucherKeGAS(kode) {
  setStatus('⚡ Menghubungkan ke Server Nur pusat...', 'info');
  
  const urlServer = typeof GAS_URL !== 'undefined' ? GAS_URL : window.location.href;
  console.log("Koneksi Apps Script terhubung ke:", urlServer, "Mengeksekusi:", kode);
  
  setTimeout(() => {
    setStatus('✅ ' + kode.toUpperCase() + ' Sukses Disinkronkan!', 'ok');
    const bubble = document.getElementById('bubbleNur');
    if (bubble) bubble.textContent = "Sukses! 💰";
    
    if (typeof ttsPlay === 'function') {
      ttsPlay('Klaim berhasil disetujui oleh server utama.', 'id');
    }
    alert('Sukses! Properti data voucher telah masuk ke database Indramayu Club.');
  }, 1200);
}

// FUNGSI UTAMA: CARI KATA / DETEKSI VOUCHER (SUARA DULUAN)
// ══════════════════════════════════════════════════════
async function cari() {
  const inp  = document.getElementById('inputKata');
  const kata = inp.value.toLowerCase().trim();
  if (!kata) return;

  document.getElementById('browserGrid').innerHTML = '';
  kataTerakhir = kata;

  // ── PENCEGAT OTOMATIS VOUCHER INDRAMAYU CLUB ──
  if (kata.includes('rpnur') || kata.includes('gif') || kata.includes('koin') || kata.includes('voucher')) {
    
    // 1. Ubah teks bubble Nur melayang terlebih dahulu
    const bubble = document.getElementById('bubbleNur');
    if (bubble) bubble.textContent = "Voucher terdeteksi! 🎁";
    
    // 2. Bunyikan suara asisten Nur terlebih dahulu (Prioritas Utama)
    if (typeof ttsPlay === 'function') {
      ttsPlay('Mendeteksi kode hadiah. Mempersiapkan klaim koin nur menuju celengan.', 'id');
    }

    // 3. Setelah perintah suara dipicu, baru render box hadiah ke layar
    prosesVoucherICM(kata);
    
    return; // Stop di sini, aman melompati kamus lokal
  }

  // ── PENCARIAN KAMUS BIASA ──
  setStatus('🔍 Mencari "' + kata + '"...', '');
  const hasil = cariLokal(kata);

  if (hasil.status === 'ketemu') {
    tampilHasil(hasil);
    simpanHistory(kata);
  } else if (hasil.status === 'mirip') {
    tampilMirip(hasil);
  } else {
    tampilTidakAda(kata);
  }
}
